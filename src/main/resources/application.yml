spring:
  datasource:
    url: jdbc:postgresql://db-env-test.cx20a6iisbey.eu-north-1.rds.amazonaws.com/postgres
    username: postgres
    password: password

  # Flyway configuration
  flyway:
    clean-disabled: true

  # Let Flyway manage the schema, Hibernate should just validate it
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# AWS S3 Configuration Settings
aws:
  s3:
    bucket-name: pfa-player-passports
    region: us-east-1
    access-key: YOUR_AWS_ACCESS_KEY_ID
    secret-key: YOUR_AWS_SECRET_ACCESS_KEY